---
resume_analysis:
  description: |
    Analyze the candidate's resume text against the target job description.
    
    Resume:
    {resume_text}
    
    Job:
    {job_description}
    
    Instructions:
    - Extract technical skill gaps and weaknesses.
    - Identify missing keywords from the job description.
    - Provide a preliminary ATS match score.
    - Return a structured JSON object.
  expected_output: |
    A valid JSON object with keys:
    {
      "skill_gaps": ["list of identified skill gaps"],
      "missing_keywords": ["list of missing keywords"],
      "ats_score": 85
    }
  agent: sleuth

interview_questions:
  description: |
    Generate exactly 5 realistic interview questions based on the candidate's profile and the job description:
    - 2 technical questions (evaluating candidate's actual projects/skills).
    - 2 behavioral questions (STAR-method prompts).
    - 1 scenario-based question (day-one work situation).
    
    Prefix each question with its type label, e.g., "[Technical]", "[Behavioral]", "[Scenario]".
    Return the questions as a JSON array of strings.
  expected_output: |
    A JSON array of exactly 5 strings, e.g.:
    [
      "[Technical] Question text...",
      "[Behavioral] Question text...",
      ...
    ]
  agent: recruiter
  context:
    - resume_analysis

challenger_questions:
  description: |
    Generate exactly 3 tough pushback questions targeting candidate weaknesses, and exactly 3 salary negotiation questions simulating HR screening conversation.
    
    Return these questions in a structured JSON object.
  expected_output: |
    A valid JSON object with keys:
    {
      "pushback_questions": ["pushback q1", "pushback q2", "pushback q3"],
      "salary_questions": ["salary q1", "salary q2", "salary q3"]
    }
  agent: challenger
  context:
    - resume_analysis

coach_report:
  description: |
    Generate a comprehensive interview preparation mentor report.
    Include the following markdown sections:
    - Executive Summary
    - Strengths to Lead With
    - STAR Method Answer Frameworks (for each of the 5 interview questions, referencing real projects from the resume)
    - Handling Tough Questions (strategies for the 3 pushback questions)
    - Salary Negotiation Strategy
    - Weakness Reframing
    - Mindset & Confidence Tips
    - Final Study Roadmap
  expected_output: |
    A detailed markdown preparation report with 8 structured sections.
  agent: coach
  context:
    - resume_analysis
    - interview_questions
    - challenger_questions
